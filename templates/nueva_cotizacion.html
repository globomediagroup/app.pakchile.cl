{% extends "layout.html" %}

{% block title %}Nueva Cotización{% endblock %}

{% block content %}
<form method="POST" action="/cotizacion/nueva" x-data='{
    lineas: [],
    validez: 15,
    cliente_id: "",
    tipo_documento: "Factura Electrónica",
    productosBase: {{ productos | tojson | safe }},
    clientesBase: {{ clientes | tojson | safe }},
    
    init() {
        this.agregarLinea();
    },
    agregarLinea() {
        this.lineas.push({ id: Date.now(), producto_id: "", cantidad: 1, precio_unitario: 0, descuento: 0, subtotal: 0 });
    },
    eliminarLinea(id) {
        if (this.lineas.length > 1) {
            this.lineas = this.lineas.filter(l => l.id !== id);
        }
    },
    actualizarPrecio(linea) {
        let prod = this.productosBase.find(p => p.id == linea.producto_id);
        if(prod) {
            linea.precio_unitario = prod.precio_venta;
        }
        this.calcularLinea(linea);
    },
    calcularLinea(linea) {
        let cant = parseFloat(linea.cantidad) || 0;
        let precio = parseFloat(linea.precio_unitario) || 0;
        let bruto = cant * precio;
        let desc = bruto * ((parseFloat(linea.descuento) || 0) / 100);
        linea.subtotal = Math.round(bruto - desc);
    },
    get subtotalGeneral() {
        return this.lineas.reduce((sum, linea) => sum + linea.subtotal, 0);
    },
    get ivaGeneral() {
        // Lógica: Si es Nota de Venta, el IVA es 0
        if (this.tipo_documento === "Nota de Venta") {
            return 0;
        }
        return Math.round(this.subtotalGeneral * 0.19);
    },
    get totalGeneral() {
        return this.subtotalGeneral + this.ivaGeneral;
    }
}' class="space-y-6 text-sm">

    <input type="hidden" name="lineas_json" :value="JSON.stringify(lineas)">

    <div class="flex justify-between items-center bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <a href="/cotizaciones" class="text-gray-400 hover:text-gray-600 flex items-center gap-2 font-medium">
            <i class="fa-solid fa-arrow-left"></i> Cotizaciones
        </a>
        <div class="flex gap-3">
            <button type="submit" name="estado" value="Borrador" class="px-5 py-2.5 border border-gray-200 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                Guardar Borrador
            </button>
            <button type="submit" name="estado" value="Enviada" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 shadow-md transition-colors flex items-center gap-2">
                <i class="fa-regular fa-paper-plane"></i> Guardar y Enviar
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-base font-bold text-gray-900 mb-4">Datos Cotización</h3>
        <div class="grid grid-cols-3 gap-6">
            
            <div x-data="{ searchCliente: '', showClientes: false, clienteNombre: 'Seleccionar cliente...' }" class="relative">
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Cliente *</label>
                <input type="hidden" name="cliente_id" :value="cliente_id" required>
                
                <button type="button" @click="showClientes = !showClientes" class="w-full text-left px-4 py-2 border border-gray-200 rounded-xl outline-none focus:border-blue-500 bg-white flex justify-between items-center">
                    <span x-text="clienteNombre" :class="cliente_id ? 'text-gray-900 font-bold' : 'text-gray-400'"></span>
                    <i class="fa-solid fa-chevron-down text-gray-400 text-xs"></i>
                </button>

                <div x-show="showClientes" @click.outside="showClientes = false" x-cloak class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden">
                    <div class="p-2 border-b bg-gray-50">
                        <input type="text" x-model="searchCliente" placeholder="Buscar por RUT o Nombre..." class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none">
                    </div>
                    <div class="max-h-48 overflow-y-auto">
                        <template x-for="c in clientesBase" :key="c.id">
                            <div x-show="searchCliente === '' || (c.razon_social + ' ' + c.rut).toLowerCase().includes(searchCliente.toLowerCase())"
                                 @click="cliente_id = c.id; clienteNombre = c.razon_social + ' (' + c.rut + ')'; showClientes = false; searchCliente = ''"
                                 class="px-4 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b border-gray-50">
                                <div class="font-bold text-gray-800" x-text="c.razon_social"></div>
                                <div class="text-[11px] text-gray-500" x-text="'RUT: ' + c.rut"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Tipo de Documento *</label>
                <select name="tipo_documento" x-model="tipo_documento" required class="w-full px-4 py-2 border border-gray-200 rounded-xl outline-none focus:border-blue-500 appearance-none bg-no-repeat bg-right pr-10" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 fill=%22none%22 viewBox=%220%200%2020%2020%22%3E%3Cpath stroke=%22%236B7280%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%221.5%22 d=%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E');">
                    <option value="Factura Electrónica">Factura Electrónica</option>
                    <option value="Factura Exenta">Factura Exenta</option>
                    <option value="Boleta">Boleta</option>
                    <option value="Nota de Venta">Nota de Venta</option>
                </select>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Validez (días)</label>
                <input type="number" name="validez_dias" x-model.number="validez" class="w-full px-4 py-2 border border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-base font-bold text-gray-900 mb-4">Productos</h3>
        
        <div class="grid grid-cols-12 gap-4 pb-2 border-b text-[11px] font-bold text-gray-400 uppercase tracking-wider">
            <div class="col-span-5">Producto</div>
            <div class="col-span-2 text-center">Cant.</div>
            <div class="col-span-2 text-right">Precio Unit.</div>
            <div class="col-span-1 text-center">Desc. %</div>
            <div class="col-span-2 text-right">Subtotal</div>
        </div>

        <div class="space-y-3 mt-3">
            <template x-for="(linea, index) in lineas" :key="linea.id">
                <div class="grid grid-cols-12 gap-4 items-center">
                    
                    <div class="col-span-5 relative" x-data="{ searchProd: '', showProd: false }">
                        <button type="button" @click="showProd = !showProd" class="w-full text-left px-3 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500 bg-white flex justify-between items-center text-sm">
                            <span x-text="linea.producto_id ? productosBase.find(p => p.id === linea.producto_id)?.nombre || 'Seleccionar producto...' : 'Seleccionar producto...'" :class="linea.producto_id ? 'text-gray-900 font-bold' : 'text-gray-400'"></span>
                            <i class="fa-solid fa-chevron-down text-gray-400 text-xs"></i>
                        </button>
                        
                        <div x-show="showProd" @click.outside="showProd = false" x-cloak class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden">
                            <div class="p-2 border-b bg-gray-50">
                                <input type="text" x-model="searchProd" placeholder="Buscar por Nombre o SKU..." class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none">
                            </div>
                            <div class="max-h-48 overflow-y-auto">
                                <template x-for="p in productosBase" :key="p.id">
                                    <div x-show="searchProd === '' || (p.nombre + ' ' + p.sku).toLowerCase().includes(searchProd.toLowerCase())"
                                         @click="linea.producto_id = p.id; actualizarPrecio(linea); showProd = false; searchProd = ''"
                                         class="px-4 py-2 cursor-pointer hover:bg-blue-50 text-sm border-b border-gray-50">
                                        <div class="font-bold text-gray-800" x-text="p.nombre"></div>
                                        <div class="text-[11px] text-gray-500" x-text="'SKU: ' + p.sku + ' | Stock: ' + p.stock"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-2">
                        <input type="number" step="0.01" min="0.01" x-model.number="linea.cantidad" @input="calcularLinea(linea)" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-center outline-none focus:border-blue-500">
                    </div>
                    
                    <div class="col-span-2">
                        <input type="number" x-model.number="linea.precio_unitario" @input="calcularLinea(linea)" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-right outline-none focus:border-blue-500">
                    </div>
                    
                    <div class="col-span-1">
                        <input type="number" x-model.number="linea.descuento" @input="calcularLinea(linea)" min="0" max="100" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-center outline-none focus:border-blue-500">
                    </div>
                    
                    <div class="col-span-2 flex items-center justify-end gap-3">
                        <span class="font-bold text-gray-900" x-text="'$' + linea.subtotal.toLocaleString('es-CL')"></span>
                        <button type="button" @click="eliminarLinea(linea.id)" class="text-red-400 hover:text-red-600 transition-colors px-2">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div class="mt-4 pt-4 border-t">
            <button type="button" @click="agregarLinea()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center gap-2 transition-all">
                <i class="fa-solid fa-plus text-gray-400"></i> Agregar Línea
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex justify-end">
        <div class="w-1/3 space-y-3 text-right">
            <div class="flex justify-between text-gray-500">
                <span>Subtotal</span>
                <span x-text="'$' + subtotalGeneral.toLocaleString('es-CL')">$0</span>
            </div>
            <div class="flex justify-between text-gray-500">
                <span>IVA (19%)</span>
                <span x-text="'$' + ivaGeneral.toLocaleString('es-CL')">$0</span>
            </div>
            <div class="flex justify-between text-xl font-bold text-gray-900 border-t pt-3">
                <span>Total</span>
                <span x-text="'$' + totalGeneral.toLocaleString('es-CL')">$0</span>
            </div>
        </div>
    </div>
</form>
{% endblock %}
