{% extends "layout.html" %}

{% block title %}Editar Cotización {{ cotizacion.numero }}{% endblock %}

{% block content %}
<form method="POST" action="/cotizacion/editar/{{ cotizacion.id }}" x-data='{
    lineas: {{ cotizacion.detalle | tojson | safe }},
    validez: {{ cotizacion.validez_dias }},
    productosBase: {{ productos | tojson | safe }},
    
    agregarLinea() {
        this.lineas.push({ id: Date.now(), producto_id: "", cantidad: 1, precio_unitario: 0, descuento: 0, subtotal: 0 });
    },
    eliminarLinea(id) {
        if (this.lineas.length > 1) {
            this.lineas = this.lineas.filter(l => l.id !== id);
        }
    },
    actualizarPrecio(linea) {
        let prod = this.productosBase.find(p => p.id == linea.producto_id);
        if(prod) {
            linea.precio_unitario = prod.precio_venta;
        }
        this.calcularLinea(linea);
    },
    calcularLinea(linea) {
        let bruto = (linea.cantidad || 0) * (linea.precio_unitario || 0);
        let desc = bruto * ((linea.descuento || 0) / 100);
        linea.subtotal = bruto - desc;
    },
    get subtotalGeneral() {
        return this.lineas.reduce((sum, linea) => sum + linea.subtotal, 0);
    },
    get ivaGeneral() {
        return Math.round(this.subtotalGeneral * 0.19);
    },
    get totalGeneral() {
        return this.subtotalGeneral + this.ivaGeneral;
    }
}' class="space-y-6 text-sm">

    <input type="hidden" name="lineas_json" :value="JSON.stringify(lineas)">

    <div class="flex justify-between items-center bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <a href="/cotizaciones" class="text-gray-400 hover:text-gray-600 flex items-center gap-2 font-medium">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
        <div class="flex gap-3">
            <button type="submit" name="estado" value="Borrador" class="px-5 py-2.5 border border-gray-200 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 transition-colors cursor-pointer">
                Guardar Borrador
            </button>
            <button type="submit" name="estado" value="Enviada" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 shadow-md transition-colors flex items-center gap-2 cursor-pointer">
                <i class="fa-solid fa-check"></i> Actualizar Cotización
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-base font-bold text-gray-900 mb-4">Datos Cotización</h3>
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Cliente *</label>
                <select name="cliente_id" required class="w-full px-4 py-2 border border-gray-200 rounded-xl outline-none focus:border-blue-500 appearance-none bg-no-repeat bg-right pr-10" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 fill=%22none%22 viewBox=%220%200%2020%2020%22%3E%3Cpath stroke=%22%236B7280%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%221.5%22 d=%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E');">
                    <option value="">Seleccionar cliente</option>
                    {% for c in clientes %}
                    <option value="{{ c.id }}" {% if c.id == cotizacion.cliente_id %}selected{% endif %}>{{ c.razon_social }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Validez (días)</label>
                <input type="number" name="validez_dias" x-model.number="validez" class="w-full px-4 py-2 border border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-base font-bold text-gray-900 mb-4">Productos</h3>
        
        <div class="grid grid-cols-12 gap-4 pb-2 border-b text-[11px] font-bold text-gray-400 uppercase tracking-wider">
            <div class="col-span-5">Producto</div>
            <div class="col-span-2 text-center">Cant.</div>
            <div class="col-span-2 text-right">Precio Unit.</div>
            <div class="col-span-1 text-center">Desc. %</div>
            <div class="col-span-2 text-right">Subtotal</div>
        </div>

        <div class="space-y-3 mt-3">
            <template x-for="(linea, index) in lineas" :key="linea.id || index">
                <div class="grid grid-cols-12 gap-4 items-center">
                    <div class="col-span-5">
                        <select x-model.number="linea.producto_id" @change="actualizarPrecio(linea)" class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500">
                            <option value="">Seleccionar producto...</option>
                            {% for p in productos %}
                            <option value="{{ p.id }}">{{ p.nombre }} ({{ p.sku }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-span-2">
                        <input type="number" x-model.number="linea.cantidad" @input="calcularLinea(linea)" min="1" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-center outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-2">
                        <input type="number" x-model.number="linea.precio_unitario" @input="calcularLinea(linea)" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-right outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-1">
                        <input type="number" x-model.number="linea.descuento" @input="calcularLinea(linea)" min="0" max="100" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-center outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-2 flex items-center justify-end gap-3">
                        <span class="font-bold text-gray-900" x-text="'$' + linea.subtotal.toLocaleString('es-CL')"></span>
                        <button type="button" @click="eliminarLinea(linea.id)" class="text-red-400 hover:text-red-600 transition-colors px-2">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div class="mt-4 pt-4 border-t">
            <button type="button" @click="agregarLinea()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center gap-2 transition-all">
                <i class="fa-solid fa-plus text-gray-400"></i> Agregar Línea
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex justify-end">
        <div class="w-1/3 space-y-3 text-right">
            <div class="flex justify-between text-gray-500">
                <span>Subtotal</span>
                <span x-text="'$' + subtotalGeneral.toLocaleString('es-CL')">$0</span>
            </div>
            <div class="flex justify-between text-gray-500">
                <span>IVA (19%)</span>
                <span x-text="'$' + ivaGeneral.toLocaleString('es-CL')">$0</span>
            </div>
            <div class="flex justify-between text-xl font-bold text-gray-900 border-t pt-3">
                <span>Total</span>
                <span x-text="'$' + totalGeneral.toLocaleString('es-CL')">$0</span>
            </div>
        </div>
    </div>
</form>
{% endblock %}
