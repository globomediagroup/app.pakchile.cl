<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - PakChile</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'], } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">
    
    <div class="bg-white rounded-[2.5rem] shadow-xl w-full max-w-md p-10 flex flex-col items-center border border-gray-100">
        
        <div class="mb-8">
            <img src="{{ url_for('static', filename='PakChile_2.png') }}" alt="PakChile Logo" 
                 class="h-16 w-auto object-contain">
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Bienvenido a PakChile</h1>
        <p class="text-slate-500 text-sm mb-8 text-center">Inicia sesión para continuar al sistema de gestión</p>

        <form action="/login" method="POST" class="w-full space-y-5">
            
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2 ml-1">Email</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" name="email" placeholder="admin@pakchile.cl" required 
                           class="w-full bg-[#f8fafc] text-gray-800 text-sm px-11 py-3.5 rounded-2xl border border-transparent outline-none focus:border-blue-500 focus:bg-white transition-all shadow-inner">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2 ml-1">Contraseña</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" placeholder="••••••••" required 
                           class="w-full bg-[#f8fafc] text-gray-800 text-sm px-11 py-3.5 rounded-2xl border border-transparent outline-none focus:border-blue-500 focus:bg-white transition-all shadow-inner">
                </div>
            </div>

            <button type="submit" class="w-full bg-[#0f172a] hover:bg-slate-800 text-white font-semibold py-4 rounded-2xl mt-4 transition-all shadow-lg active:scale-[0.98]">
                Sign in
            </button>
        </form>

        <div class="w-full flex justify-between items-center mt-10 text-[11px] text-slate-400 font-medium">
            <a href="#" class="hover:text-blue-600 transition-colors">¿Olvidaste tu contraseña?</a>
            <span class="text-gray-300">|</span>
            <a href="#" class="hover:text-blue-600 transition-colors">Soporte PakChile</a>
        </div>

    </div>

</body>
</html>
